<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Personagens Avatar</title>

    {% load static %}

    <!-- Bootstrap -->
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />
  </head>

  <body>
    <div class="container mt-5">
      <h1 class="text-center mb-4">Personagens Traduzidos</h1>

      <table class="table table-striped table-hover table-bordered">
        <thead class="table-dark">
          <tr>
            <th>#</th>
            <th>Imagem</th>
            <th>Nome</th>
            <th>Afiliação</th>
            <th>Aliados</th>
            <th>Inimigos</th>
          </tr>
        </thead>
        <tbody>
          {% for personagem in personagens %}
          <tr>
            <td>{{ forloop.counter }}</td>

            <td>
              <img
                src="{{ personagem.foto }}"
                alt="{{ personagem.nome }}"
                width="80"
              />
            </td>

            <td>{{ personagem.nome|title }}</td>

            <td>{{ personagem.afiliacao }}</td>

            <td>{{ personagem.aliados }}</td>

            <td>{{ personagem.inimigos }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
    <script src="{% static 'js/bootstrap.min.js' %}"></script>
  </body>
</html>
